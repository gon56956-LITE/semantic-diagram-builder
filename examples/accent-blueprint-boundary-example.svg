    .fanout{stroke:#FF9F2E;opacity:0.9}
    .fanin{stroke:#6EE66E;opacity:0.9}
    .route-shared{marker-end:none}
    .edge-dashed{stroke-dasharray:6 5;opacity:0.68}
    .note{font:500 12px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#C9DAF5}
    .mono{font-family:IBM Plex Mono,JetBrains Mono,Consolas,monospace}
    .icon-line{fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
  </style>
</defs>
