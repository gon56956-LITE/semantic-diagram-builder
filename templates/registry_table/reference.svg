<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="657" viewBox="0 0 1500 657" role="img" aria-label="Registry Table Reference" data-style="accent-blueprint" data-diagram-type="registry_table">
<defs>
  <pattern id="blueprint-grid-small" width="12" height="12" patternUnits="userSpaceOnUse"><path d="M 12 0 H 0 V 12" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="0.7"/></pattern>
  <pattern id="blueprint-grid" width="60" height="60" patternUnits="userSpaceOnUse"><rect width="60" height="60" fill="url(#blueprint-grid-small)"/><path d="M 60 0 H 0 V 60" fill="none" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="1"/> </pattern>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/></marker>
  <marker id="arrow-fanout" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/></marker>
  <marker id="arrow-fanin" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/></marker>
  <style>
    [data-style="accent-blueprint"] .title{font:700 27px IBM Plex Mono,JetBrains Mono,Consolas,monospace;fill:#F4F8FF;letter-spacing:.04em;text-transform:uppercase}
    [data-style="accent-blueprint"] .subtitle{font:400 13px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#C9DAF5}
    [data-style="accent-blueprint"] .group-label{font:700 15px IBM Plex Mono,JetBrains Mono,Consolas,monospace;fill:#C9DAF5;letter-spacing:.08em;text-transform:uppercase}
    [data-style="accent-blueprint"] .card-title{font:700 17px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#F4F8FF}
    [data-style="accent-blueprint"] .card-sub{font:500 13px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#C9DAF5}
    [data-style="accent-blueprint"] .edge{fill:none;stroke:#F4F8FF;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:0.88}
    [data-style="accent-blueprint"] .fanout{stroke:#FF9F2E;opacity:0.9}
    [data-style="accent-blueprint"] .fanin{stroke:#6EE66E;opacity:0.9}
    [data-style="accent-blueprint"] .route-shared{marker-end:none}
    [data-style="accent-blueprint"] .edge-dashed{stroke-dasharray:6 5;opacity:0.68}
    [data-style="accent-blueprint"] .note{font:500 14px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#C9DAF5}
    [data-style="accent-blueprint"] .mono{font-family:IBM Plex Mono,JetBrains Mono,Consolas,monospace}
    [data-style="accent-blueprint"] .table-header{font:700 15.5px IBM Plex Mono,JetBrains Mono,Consolas,monospace;fill:#F4F8FF;letter-spacing:.08em;text-transform:uppercase}
    [data-style="accent-blueprint"] .table-cell{font:500 17px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#F4F8FF}
    [data-style="accent-blueprint"] .table-cell-secondary{font:500 17px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#C9DAF5}
    [data-style="accent-blueprint"] .info-panel-title{font:700 15px IBM Plex Mono,JetBrains Mono,Consolas,monospace;fill:#F4F8FF;letter-spacing:.08em;text-transform:uppercase}
    [data-style="accent-blueprint"] .info-panel-item{font:500 14px IBM Plex Sans,Inter,Roboto Condensed,DIN,Segoe UI,Aptos,Arial,sans-serif;fill:#C9DAF5}
    [data-style="accent-blueprint"] .tree-level-label{font:700 15px IBM Plex Mono,JetBrains Mono,Consolas,monospace;fill:#C9DAF5;letter-spacing:.08em;text-transform:uppercase}
    [data-style="accent-blueprint"] .hub-label{font:700 15px IBM Plex Mono,JetBrains Mono,Consolas,monospace;fill:#C9DAF5;letter-spacing:.08em;text-transform:uppercase}
    [data-style="accent-blueprint"] .icon-line{fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
  </style>
</defs>
<rect x="0" y="0" width="1500" height="657" rx="0" fill="#062B5F"/>
<rect x="0" y="0" width="1500" height="657" rx="0" fill="url(#blueprint-grid)" opacity="1"/>
<text x="750.0" y="54" text-anchor="middle" class="title">Registry Table Reference</text>
<text x="750.0" y="80" text-anchor="middle" class="subtitle">Reference contract for a compact semantic register</text>
<rect x="70" y="115" width="1360" height="432" rx="6" fill="#FFFFFF" fill-opacity="0.03" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<rect x="70" y="115" width="1360" height="60" rx="6" fill="#FFFFFF" fill-opacity="0.06"/>
<text x="86.0" y="150.33333333333334" text-anchor="start" class="table-header" style="font-size:16px">Term</text>
<line x1="290.0" y1="115" x2="290.0" y2="547" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="306.0" y="150.33333333333334" text-anchor="start" class="table-header" style="font-size:16px">Definition</text>
<line x1="750.0" y1="115" x2="750.0" y2="547" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="835.0" y="150.33333333333334" text-anchor="middle" class="table-header" style="font-size:16px">Type</text>
<line x1="920.0" y1="115" x2="920.0" y2="547" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="936.0" y="150.33333333333334" text-anchor="start" class="table-header" style="font-size:16px">Owner</text>
<line x1="1130.0" y1="115" x2="1130.0" y2="547" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="1146.0" y="150.33333333333334" text-anchor="start" class="table-header" style="font-size:16px">Related Items</text>
<line x1="70" y1="175" x2="1430" y2="175" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="132.0" y="227.33333333333334" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Domain Map</text>
<g class="table-badge semantic-badge" data-kind="capability"><rect x="86" y="206.5" width="30" height="30" rx="5" fill="#031E42" stroke="#16D9FF" stroke-width="1.2"/><rect x="91.0" y="214.5" width="20" height="16" rx="3" fill="none" stroke="#16D9FF" stroke-width="1.2"/><path d="M91.0,219.5 H111.0 M101.0,214.5 V230.5" class="icon-line" stroke="#16D9FF"/></g>
<text x="306.0" y="216.39583333333334" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Aligned view of systems, interfaces,</text>
<text x="306.0" y="238.27083333333334" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">boundaries, and reusable knowledge modules.</text>
<text x="835.0" y="227.33333333333334" text-anchor="middle" class="table-cell-secondary" style="font-size:17.5px">Map</text>
<text x="936.0" y="227.33333333333334" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Architecture</text>
<text x="1146.0" y="216.39583333333334" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Interfaces, Modules,</text>
<text x="1146.0" y="238.27083333333334" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Boundaries</text>
<line x1="70" y1="268" x2="1430" y2="268" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="132.0" y="309.3958333333333" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Controlled</text>
<text x="132.0" y="331.2708333333333" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Source</text>
<g class="table-badge semantic-badge" data-kind="source"><rect x="86" y="299.5" width="30" height="30" rx="5" fill="#031E42" stroke="#F4F8FF" stroke-width="1.2"/><path d="M91.0,304.5 H105.0 L111.0,310.5 V324.5 H91.0 Z" fill="none" stroke="#F4F8FF" stroke-width="1.2"/><path d="M105.0,304.5 V310.5 H111.0" class="icon-line" stroke="#F4F8FF"/></g>
<text x="306.0" y="309.3958333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Authoritative document or system record used</text>
<text x="306.0" y="331.2708333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">to validate derived knowledge.</text>
<text x="835.0" y="320.3333333333333" text-anchor="middle" class="table-cell-secondary" style="font-size:17.5px">Authority</text>
<text x="936.0" y="320.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Document Control</text>
<text x="1146.0" y="320.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Revision, Approval</text>
<line x1="70" y1="361" x2="1430" y2="361" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="132.0" y="402.3958333333333" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Risk</text>
<text x="132.0" y="424.2708333333333" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Constraint</text>
<g class="table-badge semantic-badge" data-kind="risk"><rect x="86" y="392.5" width="30" height="30" rx="5" fill="#031E42" stroke="#FFD84D" stroke-width="1.2"/><path d="M101.0,397.5 L110.0,402.5 V412.5 L101.0,417.5 L92.0,412.5 V402.5 Z" fill="none" stroke="#FFD84D" stroke-width="1.2"/><path d="M97.0,407.5 L100.0,411.5 L106.0,403.5" class="icon-line" stroke="#FFD84D"/></g>
<text x="306.0" y="402.3958333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Condition that limits how an asset,</text>
<text x="306.0" y="424.2708333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">parameter, or process module can be reused.</text>
<text x="835.0" y="413.3333333333333" text-anchor="middle" class="table-cell-secondary" style="font-size:17.5px">Governance</text>
<text x="936.0" y="413.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Quality</text>
<text x="1146.0" y="413.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">CTQ, Exception</text>
<line x1="70" y1="454" x2="1430" y2="454" stroke="#F4F8FF" stroke-opacity="0.58" stroke-width="1"/>
<text x="132.0" y="495.3958333333333" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Reusable</text>
<text x="132.0" y="517.2708333333333" text-anchor="start" class="table-cell" style="font-size:17.5px;font-weight:700">Module</text>
<g class="table-badge semantic-badge" data-kind="package"><rect x="86" y="485.5" width="30" height="30" rx="5" fill="#031E42" stroke="#6EE66E" stroke-width="1.2"/><rect x="91.0" y="493.5" width="20" height="16" rx="3" fill="none" stroke="#6EE66E" stroke-width="1.2"/><path d="M91.0,498.5 H111.0 M101.0,493.5 V509.5" class="icon-line" stroke="#6EE66E"/></g>
<text x="306.0" y="484.4583333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Approved knowledge package that can be</text>
<text x="306.0" y="506.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">referenced by maps, taxonomies, or</text>
<text x="306.0" y="528.2083333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">workflows.</text>
<text x="835.0" y="506.3333333333333" text-anchor="middle" class="table-cell-secondary" style="font-size:17.5px">Asset</text>
<text x="936.0" y="506.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Knowledge Ops</text>
<text x="1146.0" y="506.3333333333333" text-anchor="start" class="table-cell-secondary" style="font-size:17.5px">Package, Instance</text>
<text x="750.0" y="629" text-anchor="middle" class="note">Reference template: rows use semantic badges derived from row kind.</text>
</svg>
