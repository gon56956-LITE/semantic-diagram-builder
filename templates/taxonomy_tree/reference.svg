<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="835" viewBox="0 0 1500 835" role="img" aria-label="Taxonomy Tree Reference" data-style="accent-blueprint" data-diagram-type="taxonomy_tree">
<defs>
