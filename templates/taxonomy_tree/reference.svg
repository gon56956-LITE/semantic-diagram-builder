<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="789" viewBox="0 0 1800 789" role="img" aria-label="Taxonomy Tree Reference" data-style="accent-blueprint" data-diagram-type="taxonomy_tree">
<defs>
