<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="620" viewBox="0 0 1300 620" role="img" aria-label="Hub Spoke Minimal" data-style="modern-tech" data-diagram-type="hub_spoke">
<defs>
  <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.1"/></filter>
  <marker id="arrow" markerWidth="9" markerHeight="9" refX="8.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  <marker id="arrow-fanout" markerWidth="9" markerHeight="9" refX="8.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker>
  <marker id="arrow-fanin" markerWidth="9" markerHeight="9" refX="8.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L0,6 L9,3 z" fill="#16A34A"/></marker>
  <style>
    [data-style=modern-tech] .title{font:700 30px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#0F172A;letter-spacing:0;text-transform:none}
    [data-style=modern-tech] .subtitle{font:400 14px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B}
    [data-style=modern-tech] .group-label{font:700 15.5px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B;letter-spacing:.06em;text-transform:uppercase}
    [data-style=modern-tech] .card-title{font:700 18px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#0F172A}
    [data-style=modern-tech] .card-sub{font:500 13.5px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B}
    [data-style=modern-tech] .edge{fill:none;stroke:#334155;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:0.76}
    [data-style=modern-tech] .fanout{stroke:#2563EB;opacity:0.74}
    [data-style=modern-tech] .fanin{stroke:#16A34A;opacity:0.74}
    [data-style=modern-tech] .route-shared{marker-end:none}
    [data-style=modern-tech] .edge-dashed{stroke-dasharray:8 8;opacity:0.66}
    [data-style=modern-tech] .note{font:500 14px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B}
    [data-style=modern-tech] .mono{font-family:Inter,Segoe UI,Aptos,Arial,sans-serif}
    [data-style=modern-tech] .table-header{font:700 15.5px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#0F172A;letter-spacing:.06em;text-transform:uppercase}
    [data-style=modern-tech] .table-cell{font:500 17px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#0F172A}
    [data-style=modern-tech] .table-cell-secondary{font:500 17px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B}
    [data-style=modern-tech] .info-panel-title{font:700 15.5px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#0F172A;letter-spacing:.06em;text-transform:uppercase}
    [data-style=modern-tech] .info-panel-item{font:500 14px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B}
    [data-style=modern-tech] .tree-level-label{font:700 15.5px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B;letter-spacing:.06em;text-transform:uppercase}
    [data-style=modern-tech] .hub-label{font:700 15.5px Inter,Segoe UI,Aptos,Arial,sans-serif;fill:#64748B;letter-spacing:.06em;text-transform:uppercase}
    [data-style=modern-tech] .icon-line{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  </style>
</defs>
<rect x="0" y="0" width="1300" height="620" rx="28" fill="#F8FBFF"/>
<text x="650.0" y="54" text-anchor="middle" class="title">Hub Spoke Minimal</text>
<text x="650.0" y="80.0" text-anchor="middle" class="subtitle">Minimal standard contract for a hub-spoke map</text>
<circle cx="650.0" cy="390" r="138.0" fill="none" stroke="#2F7DFF" stroke-opacity="0.16" stroke-width="1.4"/>
<path d="M 532.0 390.0 L 445.0 390.0" class="edge hub-spoke-link" fill="none" marker-end="url(#arrow)"/>
<path d="M 768.0 390.0 L 855.0 390.0" class="edge hub-spoke-link" fill="none" marker-end="url(#arrow)"/>
<g id="node-hub" class="hub-core card"><rect x="532.0" y="272.0" width="236.0" height="236.0" fill="none" stroke="none"/><circle cx="650.0" cy="390" r="118.0" fill="#FFFFFF" stroke="#2F7DFF" stroke-width="3.2"/><circle cx="650.0" cy="390" r="106.0" fill="none" stroke="#2F7DFF" stroke-opacity="0.32" stroke-width="1.3"/><text x="650.0" y="388.5" text-anchor="middle" class="card-title" style="font-size:21px">Knowledge Hub</text><text x="650.0" y="412.5" text-anchor="middle" class="card-sub" style="font-size:14px">center</text></g>
<g id="node-portal" class="hub-spoke-node spoke-block card"><rect x="165" y="347.0" width="280.0" height="86.0" rx="10" fill="#FFFFFF" stroke="#2F7DFF" stroke-width="2.2"/><rect x="189" y="380.0" width="18" height="20" rx="3" fill="#EFF6FF" stroke="#2F7DFF" stroke-width="1.7"/><path d="M193,386.0 H203 M193,391.0 H203 M193,396.0 H200" class="icon-line" stroke="#2F7DFF"/><text x="231" y="388.75" text-anchor="start" class="card-title" style="font-size:18px">Portal</text><text x="231" y="409.25" text-anchor="start" class="card-sub" style="font-size:13.5px">entry point</text></g>
<g id="node-modules" class="hub-spoke-node spoke-block card"><rect x="855.0" y="347.0" width="280.0" height="86.0" rx="10" fill="#FFFFFF" stroke="#22C55E" stroke-width="2.2"/><rect x="879.0" y="383.0" width="20" height="16" rx="3" fill="#ECFDF5" stroke="#22C55E" stroke-width="1.7"/><path d="M879.0,388.0 H899.0 M889.0,383.0 V399.0" class="icon-line" stroke="#22C55E"/><text x="921.0" y="388.75" text-anchor="start" class="card-title" style="font-size:18px">Modules</text><text x="921.0" y="409.25" text-anchor="start" class="card-sub" style="font-size:13.5px">assets</text></g>
<text x="650.0" y="592" text-anchor="middle" class="note">Use hub_id for the center node and order for deterministic spoke placement.</text>
</svg>
